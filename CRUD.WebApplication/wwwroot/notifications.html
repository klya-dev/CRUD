<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Signalr</title>
</head>
<body>
    <h1 id="new_notification">Новые уведомления:</h1>

    <h2 id="all_notification">Все уведомления:</h2>
    <input type="button" id="showAllNotificationButton" value="Загрузить все уведомления" />

    <script src="/lib/signalr.min.js"></script>
    <script src="/lib/signalr-protocol-msgpack.min.js"></script>
    <script>
        var connection = new signalR.HubConnectionBuilder()
            .withUrl("https://localhost:7260/notificationHub", { withCredentials: false, accessTokenFactory: () => sessionStorage.getItem("accessToken") })
            .withHubProtocol(new signalR.protocols.msgpack.MessagePackHubProtocol()) // Поддержка MessagePack протокола (MessagePack протокол быстрее, чем Json)
            .withStatefulReconnect() // Если какие-то перебои, то сервер и клиент буферизирует данные и можно переподключится
            .build();

        // Клиент получил уведомление от сервера
        connection.on("ReceiveNotification", async function (notification) {
            // Так как в SignalR я использую MessagePack протокол вместо Json, нужно использовать PascalCased имена (точно так же как в C#) | https://learn.microsoft.com/ru-ru/aspnet/core/signalr/messagepackhubprotocol?view=aspnetcore-10.0
            document.getElementById("new_notification").innerHTML += `<br>Уведомление: ${notification.Title}. ${notification.Content} (${notification.Id}) <input type="button" onclick="UsefulNotificationButtonClick('${notification.Id}')" value="Уведомление полезное" /> <input type="button" onclick="ReadNotificationButtonClick('${notification.Id}')" value="Я прочитал уведомление" />`;
        });

        // Запуск соединения
        connection.start().then(function () {
            console.log("start")
        }).catch(function (err) {
            return console.error(err.toString());
        });
    </script>

    <script>
        // Нажатие кнопки "Уведомление полезное". Отправка запроса на хаб
        async function UsefulNotificationButtonClick(notificationId) {
            connection.invoke("IsUsefulNotification", notificationId).catch(function (err) {
                return console.error(err.toString());
            });
        }

        // Нажатие кнопки "Я прочитал уведомление". Отправка запроса на сервер
        async function ReadNotificationButtonClick(notificationId) {
            // Отправляем запрос на установление статуса "прочитано"
            const response = await fetch(`https://localhost:7260/v1/user/notifications/${notificationId}/read`, {
                method: "PUT",
                headers: { "Authorization": "Bearer " + sessionStorage.getItem("accessToken") }
            });
            if (response.ok === false) {
                console.log("не удалось поменять статус уведомления на \"прочитано\"")
            }
        }
    </script>

    <script>
        // Нажатие кнопки "Загрузить все уведомления"
        document.getElementById("showAllNotificationButton").addEventListener("click", async function (event) {
            // Получаем все уведомления
            const response = await fetch("https://localhost:7260/v1/user/notifications?count=10", {
                method: "GET",
                headers: { "Accept": "application/json", "Authorization": "Bearer " + sessionStorage.getItem("accessToken") }
            });
            if (response.ok === true) {
                const data = await response.json();

                document.getElementById("all_notification").innerHTML = "Все уведомления:";
                data.forEach((notification) => {
                    // Если уведомление не прочитано
                    if (notification.isRead === false) {
                        document.getElementById("all_notification").innerHTML += `<br>Уведомление: ${notification.title}. ${notification.content} (${notification.id}) (не прочитано) <input type="button" onclick="UsefulNotificationButtonClick('${notification.id}')" value="Уведомление полезное" /> <input type="button" onclick="ReadNotificationButtonClick('${notification.id}')" value="Я прочитал уведомление" />`;
                    }
                    else { // Если уведомление прочитано
                        document.getElementById("all_notification").innerHTML += `<br>Уведомление: ${notification.title}. ${notification.content} (${notification.id}) (прочитано) <input type="button" onclick="UsefulNotificationButtonClick('${notification.id}')" value="Уведомление полезное" />`;
                    }
                });
            }
            event.preventDefault();
        });
    </script>
</body>
</html>
