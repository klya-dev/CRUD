syntax = "proto3";

option csharp_namespace = "Microservice.EmailSender.Tests"; // namespace для сгенерированных файлов C# из .proto

package emailsender; // Используется для генерации URL (/emailsender.GrpcEmailSender/Enqueue), полезен для версионирования, считай как Id

// Микросервис отправки электронных писем.
service GrpcEmailSender {
	// Добавляет письмо в очередь для отправки.
	rpc Enqueue (EnqueueLetterRequest) returns (EnqueueLetterReply);
}

// Запрос на добавление электронного письма в очередь.
message EnqueueLetterRequest {
	// Идентификатор письма (GUID).
	string Id = 1;

	// Электронная почта получателя.
	string email = 2;

	// Заголовок письма.
	string subject = 3;

	// Тело письма.
	string body = 4;
}

// Ответ на добавление электронного письма в очередь.
message EnqueueLetterReply {
	// Пустой
}

